upstream monitor_it_backend {
    server 127.0.0.1:3080;
}

server {
    server_name it.franchise-fuji.ru;

    location / {
        proxy_pass http://monitor_it_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_read_timeout 300s;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/it.franchise-fuji.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/it.franchise-fuji.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = it.franchise-fuji.ru) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name it.franchise-fuji.ru;
    return 404;
}
